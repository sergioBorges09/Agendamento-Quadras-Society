<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Quadra</title>
    <link rel="stylesheet" href="../css/cadastrar-quadra.css">
</head>

<body>
    <header class="header">
        <div class="logo-container">
            <a href="../html/home.html">
                <img src="../imagens/ReservaEsporte_Logo_PNG.png" alt="ReservaEsporte" class="logo logo-header">
            </a>
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <ul>
                <li><a href="../html/agendamentos.html" class="sidebar-link">Ver Agendamentos</a></li>
                <li><a href="../html/cadastrar-quadra.html" class="sidebar-link active">Cadastrar Quadra</a></li>
                <li><a href="../html/gerenciar-quadras.html" class="sidebar-link">Gerenciar Quadras</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="form-container">
                <h2>Cadastro de Quadra</h2>
                <form id="formQuadra" enctype="multipart/form-data">
                    <label for="nome">Nome da Quadra:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite o nome" required>

                    <label for="endereco">Endereço:</label>
                    <input type="text" id="endereco" name="endereco" placeholder="Digite o endereço" required>

                    <label for="valor">Valor (R$):</label>
                    <input type="number" id="valor" name="valor" placeholder="Digite o valor" required step="0.01"
                        min="0">

                    <label for="imagem">Imagem da Quadra:</label>
                    <input type="file" id="imagem" name="imagem" accept="image/*" required>

                    <button type="submit">Cadastrar Quadra</button>
                    <p id="msgStatus" class="msg-status"></p>
                </form>
            </div>
        </main>
    </div>

    <footer class="footer">
        <p>© 2025 ReservaEsporte - Todos os direitos reservados</p>
    </footer>

    <script src="../javaScript/cadastrar-quadra.js"></script>
</body>

</html>

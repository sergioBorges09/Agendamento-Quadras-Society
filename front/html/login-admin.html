<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador - ReservaEsporte</title>
    <link rel="stylesheet" href="../css/login-admin.css">
</head>

<body>
    <header class="header">
        <div class="logo-container">
            <a href="../html/home.html">
                <img src="../imagens/ReservaEsporte_Logo_PNG.png" alt="ReservaEsporte" class="logo logo-header">
            </a>
            <nav class="nav-bar">
                <ul class="nav-left">
                    <li><a href="../html/quadras.html" class="btn-destaque">Quadras</a></li>
                    <li><a href="../html/quemSomos.html" class="btn-agendar">Quem Somos</a></li>
                    <li><a href="../html/contato.html" class="btn-contato">Entre Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h2 class="titulo">Faça seu login ou cadastro</h2>

        <div class="form-box">
            <!-- Login -->
            <form class="formulario" id="form-login">
                <h3>Login</h3>
                <label for="email-login">E-mail</label>
                <input type="email" id="email-login" placeholder="Digite seu e-mail" required>

                <label for="senha-login">Senha</label>
                <input type="password" id="senha-login" placeholder="Digite sua senha" required>

                <button type="submit" class="btn">Entrar</button>
            </form>

            <!-- Cadastro -->
            <form class="formulario" id="form-cadastro">
                <h3>Cadastro de Administrador</h3>
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo" required>

                <label for="email-cadastro">E-mail</label>
                <input type="email" id="email-cadastro" placeholder="Digite seu e-mail" required>

                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" placeholder="Digite seu telefone" required>

                <label for="logradouro">Logradouro</label>
                <input type="text" id="logradouro" placeholder="Digite o logradouro" required>

                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" placeholder="Digite o bairro" required>

                <label for="cep">CEP</label>
                <input type="text" id="cep" placeholder="Digite o CEP" required>

                <label for="numero">Número</label>
                <input type="text" id="numero" placeholder="Número da residência" >

                <label for="complemento">Complemento</label>
                <input type="text" id="complemento" placeholder="Complemento" >

                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" placeholder="Digite a cidade" required>

                <label for="uf">UF</label>
                <input type="text" id="uf" placeholder="UF" maxlength="2" required>

                <label for="senha-cadastro">Senha</label>
                <input type="password" id="senha-cadastro" placeholder="Crie uma senha" required>

                <button type="submit" class="btn btn-cadastro">Cadastrar</button>
            </form>
        </div>

    <footer class="footer">
        <p>© 2025 ReservaEsporte - Todos os direitos reservados</p>
    </footer>

    <script src="../javaScript/login-admin.js"></script>
</body>

</html>

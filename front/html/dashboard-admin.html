<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - ReservaEsporte</title>
    <link rel="stylesheet" href="../css/dashboard-admin.css">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <a href="../html/home.html">
                <img src="../imagens/ReservaEsporte_Logo_PNG.png" alt="ReservaEsporte" class="logo logo-header">
            </a>
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <ul>
                <li><a href="#" class="sidebar-link active" onclick="mostrarSecao('agendamentos')">Agendamentos</a></li>
                <li><a href="#" class="sidebar-link" onclick="mostrarSecao('cadastrar')">Cadastrar Quadra</a></li>
                <li><a href="#" class="sidebar-link" onclick="mostrarSecao('gerenciar')">Gerenciar Quadras</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <section id="agendamentos" class="content-section active">
                <h2>Agendamentos</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Quadra</th>
                            <th>Data</th>
                            <th>Hora</th>
                            <th>Valor (R$)</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="agendamentos-tbody"></tbody>
                </table>
            </section>
            <section id="cadastrar" class="content-section">
                <h2>Cadastrar Nova Quadra</h2>
                <form id="formQuadra" enctype="multipart/form-data">
                    <input type="text" id="nome" name="nome" placeholder="Nome da Quadra" required>
                    <input type="text" id="endereco" name="endereco" placeholder="Endereço" required>
                    <input type="number" id="valor" name="valor" placeholder="Valor/Hora" required step="0.01" min="0">
                    <button type="submit">Cadastrar Quadra</button>
                    <p id="msgStatus" class="msg-status"></p>
                </form>
            </section>

            <section id="gerenciar" class="content-section">
                <h2>Gerenciar Quadras</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Endereço</th>
                            <th>Valor (R$)</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="quadras-tbody"></tbody>
                </table>
            </section>
        </main>
    </div>

    <footer class="footer">
        <p>© 2025 ReservaEsporte - Todos os direitos reservados</p>
    </footer>

    <script src="../javaScript/dashboard-admin.js"></script>
</body>
</html>

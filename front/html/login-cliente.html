<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Cliente - ReservaEsporte</title>
  <link rel="stylesheet" href="../css/login-cliente.css">
</head>

<body>
  <header class="header">
    <div class="logo-container">
      <a href="../html/home.html">
        <img src="../imagens/ReservaEsporte_Logo_PNG.png" alt="ReservaEsporte" class="logo logo-header">
      </a>
      <nav class="nav-bar">
        <ul class="nav-left">
          <li><a href="../html/quadras.html" class="btn-destaque">Quadras</a></li>
          <li><a href="../html/quemSomos.html" class="btn-agendar">Quem Somos</a></li>
          <li><a href="../html/contato.html" class="btn-contato">Entre Contato</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2 class="titulo">Faça seu login ou cadastro</h2>
    <p class="descricao">Para conseguir reservar a sua quadra ou ver os dias que você já agendou.</p>

    <div class="form-box">
      <form class="formulario" id="form-login">
        <h3>Login</h3>
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" required>

        <button type="submit" class="btn">Entrar</button>
      </form>

      <form class="formulario" id="form-cadastro">
        <h3>Cadastro</h3>
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" placeholder="Digite seu nome completo" required>

        <label for="email-cadastro">E-mail</label>
        <input type="email" id="email-cadastro" placeholder="Digite seu e-mail" required>

        <label for="telefone-contato">Telefone de contato</label>
        <input type="tel" id="telefone-contato" placeholder="Digite seu telefone de contato" required>

        <label for="CPF">CPF</label>
        <input type="text" id="CPF" placeholder="Digite seu CPF" required>

        <label for="senha-cadastro">Senha</label>
        <input type="password" id="senha-cadastro" placeholder="Crie uma senha" required>

        <button type="submit" class="btn btn-cadastro">Cadastrar</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <p>© 2025 ReservaEsporte - Todos os direitos reservados</p>
  </footer>

  <script src="../javaScript/login-cliente.js"></script>
</body>
</html>
